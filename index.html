<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>24-Week Mastery Sequence — One Skill at a Time → EU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --bg2: #0d0d0f;
        --card: #141416;
        --card2: #1a1a1e;
        --tint: #17130c;
        --line: #26262b;
        --line2: #33333a;
        --orange: #f5a623;
        --orange2: #ffb84d;
        --orange-dim: #b57a12;
        --ink: #f3f3f4;
        --body: #d7d7dc;
        --sub: #98989f;
        --sub2: #6d6d75;
        --radius: 14px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }
      body {
        background: var(--bg);
        color: var(--body);
        font:
          400 15.5px/1.6 "Inter",
          sans-serif;
        padding-bottom: 90px;

        background-size: 44px 44px;
      }
      .wrap {
        max-width: 1440px;
        margin: 0 auto;
        padding: 0 18px;
      }
      h1,
      h2,
      h3 {
        font-family: "Archivo", sans-serif;
        color: var(--ink);
        line-height: 1.15;
      }
      h1 {
        font-stretch: 125%;
        font-weight: 800;
      }
      h2,
      h3 {
        font-stretch: 100%;
        font-weight: 700;
      }
      h2 {
        font-size: 22px;
        margin-bottom: 12px;
      }
      h3 {
        font-size: 17px;
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }
      :focus-visible {
        outline: 2px solid var(--orange);
        outline-offset: 2px;
        border-radius: 6px;
      }

      /* ---------- header ---------- */
      header {
        position: relative;
        overflow: hidden;
        background: var(--bg2);
        border-bottom: 1px solid var(--line);
        padding: 42px 0 26px;
      }
      header .wrap {
        position: relative;
        z-index: 1;
      }
      .eyebrow {
        font:
          600 11px/1 "JetBrains Mono",
          monospace;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--orange);
        margin-bottom: 20px;
      }
      .eyebrow::before {
        content: "\25B8  ";
      }
      h1 {
        font-size: clamp(38px, 8.4vw, 72px);
        line-height: 0.94;
        letter-spacing: -0.01em;
      }
      h1 .o {
        color: var(--orange);
      }
      .meta {
        margin-top: 22px;
        font:
          500 13px/1.8 "JetBrains Mono",
          monospace;
        color: var(--sub);
        max-width: 780px;
      }
      .meta .s {
        color: var(--orange);
        font-weight: 600;
        margin-right: 5px;
      }
      .rule {
        height: 1px;
        background: linear-gradient(90deg, var(--line2), transparent);
        margin: 2px 0 4px;
      }

      .daybox {
        display: flex;
        flex-wrap: wrap;
        gap: 26px;
        margin: 22px 0 24px;
        align-items: center;
      }
      .stat .n {
        font-family: "Archivo", sans-serif;
        font-stretch: 125%;
        font-weight: 800;
        font-size: 30px;
        color: var(--ink);
        line-height: 1;
      }
      .stat .l {
        font:
          500 11px/1 "JetBrains Mono",
          monospace;
        color: var(--sub2);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 6px;
      }
      .bar {
        flex: 1;
        min-width: 220px;
      }
      .track {
        height: 9px;
        background: #1c1c20;
        border: 1px solid var(--line);
        border-radius: 99px;
        overflow: hidden;
      }
      .fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--orange-dim), var(--orange));
        border-radius: 99px;
        transition: width 0.4s ease;
      }
      .bar .l {
        font-size: 11.5px;
        color: var(--sub2);
        margin-top: 6px;
      }
      .bar .l .mono {
        color: var(--orange);
      }

      /* ---------- main tabs ---------- */
      nav.tabs {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        padding: 6px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        scrollbar-width: none;
      }
      nav.tabs::-webkit-scrollbar {
        display: none;
      }
      nav.tabs button {
        appearance: none;
        border: none;
        background: transparent;
        color: var(--sub);
        font:
          500 12.5px "JetBrains Mono",
          monospace;
        padding: 10px 15px;
        border-radius: 9px;
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        gap: 9px;
        align-items: center;
        transition:
          background 0.15s,
          color 0.15s;
      }
      nav.tabs button .sm {
        color: var(--orange);
        font-weight: 600;
      }
      nav.tabs button:hover {
        color: var(--ink);
        background: #1e1e22;
      }
      nav.tabs button.on {
        background: var(--orange);
        color: #111;
      }
      nav.tabs button.on .sm {
        color: rgba(0, 0, 0, 0.55);
      }

      /* ---------- panels ---------- */
      .panel {
        display: none;
        padding-top: 2px;
      }
      .panel.on {
        display: block;
      }
      .pintro {
        background: var(--card);
        border: 1px solid var(--line);
        border-left: 3px solid var(--orange);
        border-radius: 0 var(--radius) var(--radius) 0;
        padding: 20px 24px;
        margin-bottom: 20px;
      }
      .pintro .tag {
        display: flex;
        align-items: center;
        gap: 14px;
        font:
          600 11px/1 "JetBrains Mono",
          monospace;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--orange);
      }
      .pintro .tag::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--line2), transparent);
      }
      .pintro h2 {
        margin: 12px 0 5px;
      }
      .pintro p {
        color: var(--sub);
        font-size: 14px;
      }
      .pintro .mile {
        margin-top: 12px;
        font-size: 13.5px;
        color: var(--body);
        background: #1c1c20;
        border: 1px solid var(--line);
        display: inline-block;
        padding: 7px 13px;
        border-radius: 8px;
      }
      .pintro .mile b {
        color: var(--orange);
      }

      /* ---------- week tabs ---------- */
      .wtabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 2px 2px 12px;
        scrollbar-width: thin;
      }
      .wtabs button {
        appearance: none;
        border: 1px solid var(--line2);
        background: var(--card);
        color: var(--sub);
        font:
          500 12.5px "Inter",
          sans-serif;
        padding: 9px 13px;
        border-radius: 99px;
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        gap: 8px;
        align-items: center;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }
      .wtabs button:hover {
        border-color: var(--orange);
        color: var(--ink);
      }
      .wtabs button.on {
        background: var(--orange);
        border-color: var(--orange);
        color: #111;
      }
      .wtabs button .p {
        font:
          500 10.5px "JetBrains Mono",
          monospace;
        background: #1c1c20;
        color: var(--sub);
        border-radius: 99px;
        padding: 2px 7px;
      }
      .wtabs button.on .p {
        background: rgba(0, 0, 0, 0.22);
        color: #111;
      }
      .wtabs button.full .p {
        background: var(--orange);
        color: #111;
      }
      .wtabs button.on.full .p {
        background: #111;
        color: var(--orange);
      }

      .wpanel {
        display: none;
      }
      .wpanel.on {
        display: block;
      }
      .whead {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
        align-items: baseline;
        margin: 6px 2px 4px;
      }
      .whead h3 {
        font-size: 20px;
      }
      .whead .dates {
        font:
          500 12.5px "JetBrains Mono",
          monospace;
        color: var(--orange);
      }
      .whead .wp {
        margin-left: auto;
        font:
          500 12px "JetBrains Mono",
          monospace;
        color: var(--sub2);
      }
      .wfocus {
        color: var(--sub);
        font-size: 13.5px;
        margin: 0 2px 14px;
      }

      /* ---------- day cards ---------- */
      .day {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 15px 18px;
        margin-bottom: 10px;
      }
      .day.sat {
        background: var(--tint);
        border-color: rgba(245, 166, 35, 0.34);
      }
      .day.sun {
        background: transparent;
        border-style: dashed;
        border-color: var(--line2);
      }
      .dhead {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        align-items: baseline;
        margin-bottom: 6px;
      }
      .dhead .dn {
        font-family: "Archivo", sans-serif;
        font-stretch: 100%;
        font-weight: 700;
        font-size: 15.5px;
        color: var(--ink);
      }
      .dhead .dd {
        font:
          500 11.5px "JetBrains Mono",
          monospace;
        color: var(--orange);
      }
      .dhead .df {
        font-size: 12px;
        color: var(--sub2);
        margin-left: auto;
      }
      .check {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 6px 0;
        font-size: 14.5px;
      }
      .check input {
        appearance: none;
        width: 18px;
        height: 18px;
        min-width: 18px;
        border: 1.5px solid var(--line2);
        border-radius: 6px;
        background: #111114;
        cursor: pointer;
        margin-top: 2px;
        position: relative;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .check input:checked {
        background: var(--orange);
        border-color: var(--orange);
      }
      .check input:checked::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1.5px;
        width: 5px;
        height: 10px;
        border: solid #111;
        border-width: 0 2px 2px 0;
        transform: rotate(42deg);
      }
      .check span {
        color: var(--body);
      }
      .check input:checked + span {
        color: var(--sub2);
        text-decoration: line-through;
        text-decoration-color: var(--line2);
      }
      .check .bl {
        font:
          600 10.5px/1.5 "JetBrains Mono",
          monospace;
        letter-spacing: 0.04em;
        color: var(--orange);
        background: rgba(245, 166, 35, 0.1);
        border: 1px solid rgba(245, 166, 35, 0.24);
        border-radius: 5px;
        padding: 2px 6px;
        margin-right: 7px;
        white-space: nowrap;
        vertical-align: 1px;
        display: inline-block;
      }
      .check b {
        font-weight: 600;
        color: var(--ink);
      }
      .metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed var(--line2);
      }
      .metrics label {
        font-size: 12px;
        color: var(--sub);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .metrics input {
        width: 110px;
        border: 1px solid var(--line2);
        border-radius: 8px;
        padding: 6px 9px;
        font:
          500 13.5px "JetBrains Mono",
          monospace;
        color: var(--ink);
        background: #111114;
      }
      .metrics input::placeholder {
        color: var(--sub2);
      }

      /* ---------- prerequisites tab ---------- */
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 22px;
        margin-bottom: 14px;
      }
      .card.tint {
        background: var(--card2);
      }
      .card h3 {
        margin-bottom: 6px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        font:
          600 11px/1.3 "JetBrains Mono",
          monospace;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--sub2);
        text-align: left;
        padding: 8px 9px;
        border-bottom: 1px solid var(--line);
      }
      td {
        padding: 9px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        color: var(--body);
      }
      td:first-child {
        white-space: nowrap;
        font-family: "JetBrains Mono", monospace;
        font-size: 12.5px;
        color: var(--orange);
      }
      td b {
        color: var(--ink);
      }
      tr:last-child td {
        border-bottom: none;
      }
      .rulelist {
        list-style: none;
      }
      .rulelist li {
        padding: 8px 0 8px 24px;
        position: relative;
        font-size: 14px;
        border-bottom: 1px solid var(--line);
      }
      .rulelist li:last-child {
        border-bottom: none;
      }
      .rulelist li::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 15px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--orange);
      }
      .rulelist b {
        color: var(--ink);
      }

      /* ---------- wall goal (signature) ---------- */
      .wall {
        position: relative;
        overflow: hidden;
        background: linear-gradient(155deg, #171310, #0f0f11 62%);
        border: 1px solid rgba(245, 166, 35, 0.3);
        border-radius: var(--radius);
        padding: 28px 30px;
        color: #e9e9ec;
      }
      .wall::before {
        content: "";
        position: absolute;
        top: -120px;
        right: -80px;
        width: 340px;
        height: 340px;
        background: radial-gradient(
          circle,
          rgba(245, 166, 35, 0.16),
          rgba(245, 166, 35, 0) 68%
        );
        pointer-events: none;
      }
      .wall > * {
        position: relative;
        z-index: 1;
      }
      .wall h3 {
        color: var(--orange);
        font-size: 19px;
      }
      .wall .g {
        font-family: "Archivo", sans-serif;
        font-stretch: 100%;
        font-weight: 700;
        font-size: 20px;
        margin: 6px 0 14px;
        color: #fff;
      }
      .wall ul {
        list-style: none;
      }
      .wall li {
        padding: 5px 0 5px 22px;
        position: relative;
        font-size: 14.5px;
      }
      .wall li::before {
        content: "\2192";
        position: absolute;
        left: 0;
        color: var(--orange);
      }
      .wall .quiet {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 13.5px;
        color: #a9a9b2;
      }
      .note {
        font-size: 12.5px;
        color: var(--sub2);
        margin-top: 24px;
        text-align: center;
      }

      @media print {
        body {
          background: #fff;
          color: #111;
          background-image: none;
        }
        header {
          padding: 12px 0;
          background: #fff;
          border-color: #ccc;
        }
        header::before,
        .wall::before {
          display: none;
        }
        nav.tabs,
        .wtabs {
          display: none;
        }
        .panel,
        .wpanel {
          display: block !important;
          padding-top: 10px;
        }
        .card,
        .card.tint,
        .day,
        .day.sat,
        .pintro,
        .wall {
          background: #fff;
          color: #111;
          border-color: #ccc;
        }
        h1,
        h2,
        h3,
        .wall .g,
        .check b,
        td b,
        .rulelist b {
          color: #111;
        }
        .eyebrow,
        .pintro .tag,
        .dhead .dd,
        .whead .dates,
        td:first-child,
        .wall h3,
        .check .bl {
          color: #b26a00;
        }
        .check .bl {
          background: #fff8ec;
          border-color: #e7c98d;
        }
        .day {
          page-break-inside: avoid;
        }
      }

      /* ---------- stage start picker ---------- */
      .startpick {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin: 14px 0 16px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
      }
      .startpick label {
        font:
          600 11px/1 "JetBrains Mono",
          monospace;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--orange);
      }
      .startpick input[type="date"] {
        background: var(--card2);
        border: 1px solid var(--line2);
        border-radius: 8px;
        color: var(--ink);
        font:
          500 14px/1 "JetBrains Mono",
          monospace;
        padding: 8px 10px;
        color-scheme: dark;
      }
      .startpick input[type="date"]:focus {
        border-color: var(--orange);
        outline: none;
      }
      .startpick .hint {
        font-size: 12px;
        color: var(--sub2);
      }
      .note {
        margin: 26px 0 8px;
        font-size: 12.5px;
        color: var(--sub2);
      }
    </style>
  </head>
  <body class="wrap">
    <div style="position: relative; overflow: hidden; padding: 10px">
      <nav class="tabs" id="tabs" role="tablist"></nav>
    </div>
    <div id="panels"></div>
    <div class="daybox">
      <div class="stat">
        <div class="n mono" id="dayN">&mdash;</div>
        <div class="l">Day of 168</div>
      </div>
      <div class="stat">
        <div class="n mono" id="wkN">&mdash;</div>
        <div class="l">Current week</div>
      </div>
      <div class="bar">
        <div class="track"><div class="fill" id="allFill"></div></div>
        <div class="l">
          <span id="allPct" class="mono">0%</span> of all checkpoints complete
        </div>
      </div>
    </div>

    <script>
      /* ------------------------------------------------------------------ data */

      ];

      var W = {
        1: {

      function store(k, v) {
        try {

      }
      function read(k) {
        try {
          return localStorage.getItem("sq24-" + k);
        } catch (e) {
          return null;
        }
      }

      function parseISO(s) {
        var p = s.split("-");
        return new Date(+p[0], +p[1] - 1, +p[2]);
      }
      function addDays(d, n) {
        var x = new Date(d);
        x.setDate(x.getDate() + n);
        return x;
      }
      var DAYS3 = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      var MO3 = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];
      function fmt(d) {
        return DAYS3[d.getDay()] + ", " + MO3[d.getMonth()] + " " + d.getDate();
      }
      function fmtLong(d) {
        return MO3[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
      }
      function stageStart(p) {
        var v = read("start-" + p.id);
        return parseISO(v && /^\d{4}-\d{2}-\d{2}$/.test(v) ? v : p.def);
      }
      function stageEnd(p) {
        return addDays(stageStart(p), p.weeks.length * 7 - 1);
      }

        switch (di) {

      });
      texts.forEach(function (t) {
        var v = read(t.dataset.k);
        if (v) t.value = v;
        t.addEventListener("input", function () {
          store(t.dataset.k, t.value);
        });
      });

      function refresh() {
        var done = 0;
        boxes.forEach(function (b) {
          if (b.checked) done++;
        });
        var pct = Math.round((done / boxes.length) * 100);
        document.getElementById("allFill").style.width = pct + "%";
        document.getElementById("allPct").textContent = pct + "%";
        for (var n = 1; n <= 24; n++) {
          var wb = document.querySelectorAll('input[data-w="' + n + '"]');
          var d = 0;
          wb.forEach(function (b) {
            if (b.checked) d++;
          });
          var pill = document.getElementById("wp" + n),
            head = document.getElementById("wh" + n);
          if (pill) {
            pill.textContent = d + "/" + wb.length;
            pill.parentElement.classList.toggle("full", d === wb.length);
          }
          if (head) head.textContent = d + "/" + wb.length + " done";
        }
      }

      /* ----------------------------------------------- day counter + auto-open */
      function openWeek(n) {
        var pid = PHASES.filter(function (p) {
          return p.weeks.indexOf(n) > -1;
        })[0].id;
        tabsEl.querySelectorAll("button").forEach(function (x) {
          x.classList.toggle("on", x.dataset.t === pid);
        });
        document.querySelectorAll(".panel").forEach(function (x) {
          x.classList.remove("on");
        });
        document.getElementById("pane-" + pid).classList.add("on");
        var pane = document.getElementById("pane-" + pid);
        pane.querySelectorAll(".wtabs button").forEach(function (x) {
          x.classList.toggle("on", x.dataset.w == String(n));
        });
        pane.querySelectorAll(".wpanel").forEach(function (x) {
          x.classList.remove("on");
        });
        document.getElementById("wpane-" + n).classList.add("on");
      }

      var dEl = document.getElementById("dayN"),
        wEl = document.getElementById("wkN");
      function counter() {
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var first = stageStart(PHASES[0]);
        if (today < first) {
          dEl.textContent = "–";
          wEl.textContent = "prep";
          return;
        }
        var priorWeeks = 0;
        for (var i = 0; i < PHASES.length; i++) {
          var p = PHASES[i],
            s = stageStart(p),
            e = stageEnd(p);
          if (today >= s && today <= e) {
            var into = Math.floor((today - s) / 86400000);
            dEl.textContent = String(priorWeeks * 7 + into + 1);
            var cw = p.weeks[Math.floor(into / 7)];
            wEl.textContent = "W" + cw;
            openWeek(cw);
            return;
          }
          priorWeeks += p.weeks.length;
        }
        if (today > stageEnd(PHASES[PHASES.length - 1])) {
          dEl.textContent = "168";
          wEl.textContent = "done";
          return;
        }
        /* today falls in a gap between stages — point at the next upcoming stage */
        for (var j = 0; j < PHASES.length; j++) {
          if (today < stageStart(PHASES[j])) {
            dEl.textContent = "–";
            wEl.textContent = "→ " + PHASES[j].num.split(" ")[1];
            return;
          }
        }
      }
      counter();
      refresh();
    </script>
  </body>
</html>
